<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Poder da Oracao</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A84C;--gold-light:#E8D08A;--gold-pale:#F5E9C0;--gold-dim:#7A6030;
  --black:#080808;--black-2:#111111;--text:#2a1f0e;--text-dim:#5a4a2a;
  --page-bg:#faf8f3;
}
html{width:100%;height:100%;background:var(--black);}
body{width:100%;background:var(--black);font-family:"Crimson Text",Georgia,serif;
  -webkit-text-size-adjust:100%;overflow-x:hidden;}

/* HEADER */
.book-header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;min-height:52px;
  background:rgba(8,8,8,0.97);
  border-bottom:1px solid rgba(201,168,76,0.15);
}
.back-btn{
  font-family:"Cinzel",serif;font-size:0.58rem;letter-spacing:0.25em;
  color:var(--gold-dim);text-transform:uppercase;background:none;border:none;
  cursor:pointer;padding:8px 4px;-webkit-tap-highlight-color:transparent;
  white-space:nowrap;
}
.book-info{text-align:center;flex:1;padding:0 8px;}
.book-title-header{font-family:"Cinzel",serif;font-size:0.62rem;letter-spacing:0.3em;color:var(--gold);text-transform:uppercase;line-height:1.3;}
.book-day-header{font-family:"Crimson Text",serif;font-size:0.78rem;font-style:italic;color:var(--gold-dim);margin-top:2px;}
.header-spacer{width:70px;}

/* PROGRESS */
.progress-bar{position:fixed;top:52px;left:0;right:0;height:2px;background:rgba(201,168,76,0.08);z-index:999;}
.progress-fill{height:100%;background:linear-gradient(to right,var(--gold-dim),var(--gold));transition:width 0.4s ease;}

/* MAIN */
.main-wrap{padding-top:56px;width:100%;}

/* PAGINA - estilo editorial */
.page-inner{
  width:100%;height:100%;
  background:var(--page-bg);
  position:relative;
  overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 20px 20px;
}

/* numero do dia - topo */
.page-day-label{
  font-family:"Cinzel",serif;font-size:0.5rem;letter-spacing:0.55em;
  color:var(--gold-dim);text-transform:uppercase;
  margin-bottom:4px;text-align:center;width:100%;
}
.page-prayer-title{
  font-family:"Cinzel",serif;font-size:0.9rem;font-weight:600;
  color:var(--gold-dim);letter-spacing:0.05em;line-height:1.3;
  text-align:center;width:100%;margin-bottom:10px;
}

/* linha decorativa */
.page-rule{
  width:50px;height:1px;
  background:linear-gradient(to right,transparent,var(--gold-dim),transparent);
  margin:0 auto 12px;
}

/* imagem central - sem bordas, menor */
.page-img-wrap{
  width:75%;max-width:220px;
  margin:0 auto 14px;
  position:relative;
}
.page-img-wrap img{
  width:100%;display:block;
  /* sem bordas, sem sombra quadrada - imagem com fundo branco fica natural */
  filter:drop-shadow(0 4px 16px rgba(0,0,0,0.18));
}

/* texto da oracao - por cima sem fundo preto */
.page-prayer-text{
  font-family:"Crimson Text",serif;font-size:0.92rem;font-style:italic;
  color:var(--text);line-height:1.78;
  text-align:center;width:100%;
}

/* audio */
.page-audio{
  display:flex;align-items:center;gap:10px;
  margin-top:14px;padding-top:12px;
  border-top:1px solid rgba(201,168,76,0.2);
  width:100%;justify-content:center;
}
.play-btn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background 0.2s;
}
.play-btn:active,.play-btn:hover{background:rgba(201,168,76,0.25);}
.play-btn svg{width:13px;height:13px;fill:var(--gold-dim);}
.audio-label{font-family:"Cinzel",serif;font-size:0.48rem;letter-spacing:0.3em;color:var(--gold-dim);text-transform:uppercase;}

/* cantos dourados decorativos */
.corner{position:absolute;width:18px;height:18px;opacity:0.35;}
.corner.tl{top:8px;left:8px;border-top:1px solid var(--gold);border-left:1px solid var(--gold);}
.corner.tr{top:8px;right:8px;border-top:1px solid var(--gold);border-right:1px solid var(--gold);}
.corner.bl{bottom:8px;left:8px;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold);}
.corner.br{bottom:8px;right:8px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}

/* numero de pagina rodape */
.page-num{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  font-family:"Cinzel",serif;font-size:0.45rem;letter-spacing:0.4em;
  color:var(--gold-dim);opacity:0.5;
}

/* ===== MOBILE ===== */
.mobile-view{display:block;}
.mobile-book{
  width:100%;
  height:calc(100svh - 56px);
  position:relative;
  background:var(--black);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

/* container do flip mobile */
.mobile-flip-wrap{
  width:92vw;max-width:400px;
  height:calc(100svh - 80px);
  position:relative;
  perspective:1200px;
}

.mob-card{
  position:absolute;inset:0;
  background:var(--page-bg);
  border-radius:2px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 2px 8px rgba(0,0,0,0.3);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transition:transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94),opacity 0.35s ease;
  transform-origin:center center;
  transform-style:preserve-3d;
  backface-visibility:hidden;
}

/* animacoes flip 3D mobile */
@keyframes flipToLeft{
  0%  {transform:perspective(1200px) rotateY(0deg);opacity:1;}
  45% {transform:perspective(1200px) rotateY(-90deg);opacity:0.1;box-shadow:-20px 0 40px rgba(0,0,0,0.4);}
  100%{transform:perspective(1200px) rotateY(-180deg);opacity:0;}
}
@keyframes flipFromRight{
  0%  {transform:perspective(1200px) rotateY(180deg);opacity:0;}
  55% {transform:perspective(1200px) rotateY(90deg);opacity:0.1;box-shadow:20px 0 40px rgba(0,0,0,0.4);}
  100%{transform:perspective(1200px) rotateY(0deg);opacity:1;}
}
@keyframes flipToRight{
  0%  {transform:perspective(1200px) rotateY(0deg);opacity:1;}
  45% {transform:perspective(1200px) rotateY(90deg);opacity:0.1;box-shadow:20px 0 40px rgba(0,0,0,0.4);}
  100%{transform:perspective(1200px) rotateY(180deg);opacity:0;}
}
@keyframes flipFromLeft{
  0%  {transform:perspective(1200px) rotateY(-180deg);opacity:0;}
  55% {transform:perspective(1200px) rotateY(-90deg);opacity:0.1;box-shadow:-20px 0 40px rgba(0,0,0,0.4);}
  100%{transform:perspective(1200px) rotateY(0deg);opacity:1;}
}
.anim-flip-out-left {animation:flipToLeft 0.42s ease forwards;}
.anim-flip-in-right {animation:flipFromRight 0.42s ease forwards;pointer-events:none;}
.anim-flip-out-right{animation:flipToRight 0.42s ease forwards;}
.anim-flip-in-left  {animation:flipFromLeft 0.42s ease forwards;pointer-events:none;}

/* setas mobile */
.mob-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  z-index:200;width:40px;height:40px;border-radius:50%;
  background:rgba(8,8,8,0.78);border:1px solid rgba(201,168,76,0.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  color:var(--gold);font-size:1.1rem;
  box-shadow:0 2px 12px rgba(0,0,0,0.5);
}
.mob-arrow.prev{left:4px;}
.mob-arrow.next{right:4px;}
.mob-arrow.hidden{opacity:0.12;pointer-events:none;}

/* ===== DESKTOP ===== */
.desktop-view{display:none;}

@media(min-width:769px){
  .mobile-view{display:none;}
  .desktop-view{
    display:flex;align-items:center;justify-content:center;
    width:100%;height:calc(100vh - 56px);
    background:var(--black);
  }
  .desk-book-wrap{
    position:relative;
    width:min(90vw,960px);
    height:min(80vh,640px);
  }
  /* Turn.js vai aqui */
  #desk-book{
    width:100%;height:100%;
  }
  .desk-page-inner{
    width:100%;height:100%;
    background:var(--page-bg);
    position:relative;
    overflow:hidden;
    display:flex;flex-direction:column;align-items:center;
    padding:32px 28px 24px;
    border:1px solid rgba(201,168,76,0.15);
  }
  .desk-page-inner .page-img-wrap{max-width:200px;}
  .desk-page-inner .page-prayer-text{font-size:0.88rem;}

  /* sombra lombada */
  .desk-book-wrap::after{
    content:"";
    position:absolute;left:50%;top:0;bottom:0;
    width:12px;transform:translateX(-50%);
    background:linear-gradient(to right,rgba(0,0,0,0.6),rgba(201,168,76,0.08),rgba(0,0,0,0.6));
    z-index:20;pointer-events:none;
  }

  .desk-arrow{
    position:absolute;top:50%;transform:translateY(-50%);
    z-index:50;width:46px;height:46px;border-radius:50%;
    background:rgba(8,8,8,0.85);border:1px solid rgba(201,168,76,0.35);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--gold);font-size:1.1rem;
    box-shadow:0 2px 20px rgba(0,0,0,0.7);
    transition:background 0.2s;
  }
  .desk-arrow:hover{background:rgba(201,168,76,0.15);}
  .desk-arrow.prev{left:-58px;}
  .desk-arrow.next{right:-58px;}
  .desk-arrow.hidden{opacity:0.12;pointer-events:none;}
}
</style>
</head>
<body>

<div class="book-header">
  <button class="back-btn" onclick="goBack()">&#8592; Cronogramas</button>
  <div class="book-info">
    <div class="book-title-header" id="header-title">Cronograma da Cura</div>
    <div class="book-day-header" id="header-day">Dia 1 de 30</div>
  </div>
  <div class="header-spacer"></div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="main-wrap">

  <!-- MOBILE -->
  <div class="mobile-view">
    <div class="mobile-book">
      <button class="mob-arrow prev hidden" id="mob-prev" onclick="navigate(-1)">&#8592;</button>
      <div class="mobile-flip-wrap">
        <div class="mob-card" id="mob-card">
          <div class="page-inner">
            <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
            <div class="page-day-label" id="mob-label"></div>
            <div class="page-prayer-title" id="mob-title"></div>
            <div class="page-rule"></div>
            <div class="page-img-wrap">
              <img id="mob-img" src="" alt="oracao">
            </div>
            <div class="page-prayer-text" id="mob-text"></div>
            <div class="page-audio">
              <div class="play-btn" onclick="toggleAudio()">
                <svg id="icon-mob" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </div>
              <span class="audio-label">Ouvir oracao</span>
            </div>
            <div class="page-num" id="mob-num"></div>
          </div>
        </div>
      </div>
      <button class="mob-arrow next" id="mob-next" onclick="navigate(1)">&#8594;</button>
    </div>
  </div>

  <!-- DESKTOP com Turn.js -->
  <div class="desktop-view">
    <div class="desk-book-wrap">
      <button class="desk-arrow prev hidden" id="desk-prev" onclick="navigate(-1)">&#8592;</button>
      <div id="desk-book"></div>
      <button class="desk-arrow next" id="desk-next" onclick="navigate(1)">&#8594;</button>
    </div>
  </div>

</div>

var DIAS = [
  {dia:1,titulo:"O Silencio que Cura",texto:"Senhor, no silencio desta manha, entrego-Te as feridas que ninguem ve. Ha um peso que carrego ha tanto tempo que ja nao sei mais como seria viver sem ele. Mas Tu sabes. Tu veste cada camada, cada cicatriz, cada lugar onde a dor se instalou como moradora permanente. Que a Tua presenca seja o balsamo que nenhuma medicina pode oferecer. Cura-me por dentro, nas raizes, onde nenhuma mao humana alcanca. Faz de mim um testemunho vivo de que o impossivel e o Teu territorio favorito."},
  {dia:2,titulo:"A Forca no Fragil",texto:"Pai, quando me sinto partido, lembro que o vaso rachado deixa passar mais luz. Esta nao e uma filosofia de consolo barato - e uma verdade que aprendi nas madrugadas dificeis, quando o chao desapareceu e so restou a Tua mao. Usa minha fragilidade como instrumento da Tua gloria. Nao preciso ser forte. Preciso ser Teu. E Teu, mesmo incompleto, mesmo curvado pelo peso dos dias."},
  {dia:3,titulo:"Rendicao Sagrada",texto:"Nao minha vontade, mas a Tua. Estas palavras me custam, Senhor, porque entregar o controle e o ato mais corajoso e mais aterrorizante que ja pratiquei. Eu que tanto planejei, tanto calculei, tanto tentei governar o que nunca esteve em minhas maos - hoje depondo as armas diante de Ti. Recebe minha rendicao como oferenda. Nao a rendicao do derrotado, mas a rendicao do que aprendeu que ha algo maior do que seus proprios planos."},
  {dia:4,titulo:"A Voz que Guia",texto:"Fala, Senhor, porque o Teu servo ouve. No meio de tantas vozes que disputam minha atencao, escolho silenciar tudo para ouvir apenas a Ti. Tua voz e diferente. Nao precisa gritar para ser ouvida. Ela atravessa o caos como agua atravessa a rocha, com paciencia, com precisao, com poder. Fala, Senhor. Estou ouvindo. E o que quer que digas, darei um passo na direcao da Tua palavra."},
  {dia:5,titulo:"Paz que Desconcerta",texto:"Concede-me, o Deus, a paz que nao depende de circunstancias. Nao aquela paz artificial que construimos quando forcamos um sorriso. Mas a paz que excede o entendimento, aquela que os filosofos buscaram e nao encontraram, que os ricos tentaram comprar e nao conseguiram, e que Tu ofereces gratuitamente aos que Te buscam de coracao. Que esta paz seja minha armadura hoje."},
  {dia:6,titulo:"O Peso que Larguei",texto:"Hoje escolho soltar o que carregava sem Te pedir ajuda. Ha quanto tempo eu insistia em resolver sozinho o que nunca foi para ser carregado por uma pessoa so? O orgulho, o rancor, a ansiedade. Ponho tudo a Teus pes, Senhor. Nao porque seja facil. Mas porque confio que Tuas maos sao maiores que meu fardo, e Teu coracao mais misericordioso do que minha culpa merece."},
  {dia:7,titulo:"Caminhos Reconstruidos",texto:"Senhor, refaz em mim o que o tempo e as escolhas destruiram. Ha ruinas dentro de mim que eu tentei esconder com sorriso, com trabalho, com barulho. Mas Tu enxergas alem da fachada. Como o oleiro que nao descarta o barro torto mas volta a mesa de trabalho com paciencia, volta a me moldar. Mesmo que o processo doa. Estou disponivel, Senhor. Eis o barro, nas maos do melhor oleiro."},
  {dia:8,titulo:"A Gratidao como Arma",texto:"Agradeco-Te, Pai, nao apenas pelo que deste, mas pelo que nao permitiste. Aquela porta que nao se abriu me poupou de um caminho equivocado. Aquele fracasso que tanto chorei me ensinou o que o sucesso nunca ensinaria. Tua sabedoria nas negativas e tao grande quanto Tua generosidade nos dons. Ensina-me a agradecer com a mesma intensidade pelo que nao veio."},
  {dia:9,titulo:"Diante do Inimigo",texto:"Preparas diante de mim uma mesa na presenca dos meus adversarios. Que imagem poderosa, Senhor. Nao me tiras do campo de batalha, mas me serves ali mesmo, onde o inimigo observa. A uncao que derrama sobre minha cabeca e visivel para todos que esperavam minha derrota. Que minha paz neste momento dificil seja o testemunho mais eloquente que ja dei."},
  {dia:10,titulo:"Luz nas Trevas Internas",texto:"Ha partes de mim que nunca mostrei a ninguem. Lugares escuros onde a vergonha mora, onde erros antigos habitam como fantasmas. Entra, Senhor, nao para me condenar, pois em Cristo nao ha mais condenacao, mas para iluminar. Porque sei que onde Tu entras, as trevas nao conseguem permanecer. A Tua luz nao expoe para envergonhar, ela revela para libertar."},
  {dia:11,titulo:"O Dom do Recomeco",texto:"Cada amanhecer e uma tese sobre a misericordia divina. Que argumento eloquente o do sol que nasce sem perguntar se merecemos mais um dia. Tu que renovas as manhas com uma generosidade que desafia toda logica humana, renova tambem este coracao que tantas vezes falhou. Sou grato pelo dia de hoje. Nao porque sera perfeito, mas porque e mais uma oportunidade de ser Teu."},
  {dia:12,titulo:"A Oracao dos Sem Palavras",texto:"Ha dias, Senhor, em que as palavras nao vem. Em que a dor e grande demais para caber em frases, ou a gratidao e tao profunda que qualquer expressao parece pequena. Recebe o silencio que trago como oracao. Me consola saber que o proprio Espirito intercede por mim com gemidos inexprimiveis. Tu interpretas o que nem eu mesmo compreendo. E isso e suficiente."},
  {dia:13,titulo:"Firmeza no Tremor",texto:"Quando tudo treme ao redor, faz-me ser como arvore de raizes profundas. O segredo nao e que a arvore nao balanca. O segredo e que ela balanca sem cair, porque o que esta embaixo e mais forte do que o que esta em cima. Que o vento me curve, mas nao me quebre. Que quando a tempestade passar, eu ainda esteja de pe, nao pelo meu esforco, mas pela profundidade das minhas raizes em Ti."},
  {dia:14,titulo:"O Milagre Ordinario",texto:"Ensinai-me a ver o extraordinario no ordinario, Senhor. Passei tanto tempo esperando por grandes sinais que deixei escapar os milagres que Tu realizas em silencio, a cada dia. O milagre do pao que nutre. Da agua que restaura. Do folego que vem sem que eu precise pedir. Que eu nao precise de grandiosidade para reconhecer a Tua presenca. Que o simples me surpreenda."},
  {dia:15,titulo:"Presenca no Deserto",texto:"Mesmo no deserto, Tu es. Esta e a descoberta que so o deserto ensina. Nao apenas nos momentos de abundancia, quando e facil Te louvar. Mas na aridez do silencio divino, quando o ceu parece fechado. Ali Tu estas. Formando em mim algo que o conforto nunca formaria. A resistencia que a dificuldade desenvolve. A fe que so cresce quando nao ha outro recurso."},
  {dia:16,titulo:"O Escudo Invisivel",texto:"Cobre-me, Senhor, com aquilo que os olhos nao veem mas que e mais real do que tudo que e visivel. Nao uma promessa de que nunca serei atingido, mas a certeza de que nunca combato sozinho. Que os meus anjos guardem os meus caminhos. Que o sangue do Cordeiro fale mais alto do que qualquer acusacao. Sou Teu, e isso muda tudo."},
  {dia:17,titulo:"Palavras como Sementes",texto:"Que as palavras que saem de minha boca sejam sementes de vida, nao pedras de destruicao. Guarda minha lingua, Senhor, ela e poderosa demais para ficar sem governo. Que eu fale bencao quando poderia maldizer. Que eu fale verdade quando a mentira seria mais confortavel. Que minhas palavras construam onde poderiam demolir. Que plantem onde poderiam arrancar."},
  {dia:18,titulo:"A Heranca Eterna",texto:"Lembra-me hoje, Pai, que sou herdeiro de um reino que nao treme com as noticias do dia. A heranca que recebi e aquela que a mariposa nao roi, que a ferrugem nao corroi, que ladrao nao pode roubar. Que esta perspectiva eterna mude minha forma de enfrentar o temporario. O que perco aqui nao define o que tenho la. E o que tenho la e suficiente."},
  {dia:19,titulo:"Quando a Fe Vacila",texto:"Senhor, acredito, socorre a minha incredulidade. Nao venho com uma fe perfeita, inabalavel. Venho com a fe que tenho, pequena, as vezes tremula. E me consola saber que Tu nao exiges a fe perfeita, exiges a fe honesta. Aquela que persiste mesmo quando nao entende. Que continua mesmo quando nao ve. A fe perfeita nao existe nesta vida, existe a fe que persiste."},
  {dia:20,titulo:"O Amor que Exige Tudo",texto:"Amar como Tu amas, Senhor, nao e sentimento, e decisao que se renova todos os dias. E escolher o bem do outro mesmo quando meu proprio coracao esta vazio. E perdoar antes que o pedido de desculpas chegue. E permanecer quando partir seria mais facil. Forma em mim este amor que exige tudo e que, exatamente por isso, e o mais libertador de todos."},
  {dia:21,titulo:"Desapego e Abundancia",texto:"Ensina-me o paradoxo, Senhor: que ao soltar, recebo mais. Que ao dar o que tenho, sou preenchido com o que nao poderia comprar. Que ao morrer para mim mesmo, para meus planos, minha agenda, meu ego, comeco verdadeiramente a viver. Esta e a inversao do Reino. Que eu viva por esta logica hoje. Que minhas maos abertas para dar sejam tambem maos abertas para receber."},
  {dia:22,titulo:"A Ferida que Forma",texto:"Nao peco que removes todas as dores do meu caminho, Senhor, peco que nenhuma seja desperdicada. Aprendi, nas cicatrizes que ja tenho, que a ferida nao tratada envenena, mas a ferida redimida ensina. Que cada ferida se torne fonte de sabedoria. De empatia. De compaixao. Usa minhas quebras como pontes para o coracao dos que precisam saber que ha saida."},
  {dia:23,titulo:"Silencio Fertil",texto:"Ha um silencio que e ausencia, vazio e angustiante. E ha um silencio que e presenca, fecundo e profundo. Conduz-me ao segundo, Senhor. Ao silencio onde Tu falas com uma voz que nao precisa de som. Onde o impossivel germina como semente que trabalha debaixo da terra. Onde a alma finalmente para de correr e descobre que o que buscava estava aqui o tempo todo."},
  {dia:24,titulo:"A Justica que Espero",texto:"Entrego-Te as injusticas que sofri, Senhor. Nao porque nao doam, doem profundamente. Mas porque descobri que carregar o peso da injustica na propria alma e ser ferido duas vezes. Sei que a Tua balanca e mais precisa que minha sede de vinganca. Que o Teu momento e mais sabio que minha pressa por justica. Recebe o que nao e meu para julgar."},
  {dia:25,titulo:"Presenca Plena",texto:"Liberta-me da ansiedade do futuro que ainda nao chegou e do peso do passado que ja se foi. Vivo tao raramente no unico tempo que de fato existe: o agora. E e exatamente no agora que Tu habitas. Faz-me presente no presente. Que eu ouca realmente quando alguem fala. Que eu experimente a plenitude de cada momento como o dom que e."},
  {dia:26,titulo:"O Nome Acima de Todos",texto:"Ha poder no Teu nome, Senhor, que nao compreendo completamente com minha razao, mas que experimento com toda a minha historia. Vi o que esse nome fez em momentos em que nenhuma outra coisa funcionaria. Que este nome seja minha primeira reacao, antes do panico, antes da duvida. Porque neste nome esta tudo o que precisarei jamais."},
  {dia:27,titulo:"Comunhao Profunda",texto:"Nao quero apenas conhecer sobre Ti, Senhor, quero conhecer-Te. Ha uma diferenca enorme entre acumular informacao sobre Deus e experienciar a presenca de Deus. Aproxima-me do coracao do Pai, nao da periferia da religiao, mas do centro vivo da relacao. Que minha vida de oracao seja conversa entre pai e filho, entre amigo e amigo."},
  {dia:28,titulo:"A Vitoria Ja Dada",texto:"Lembra-me hoje, Senhor, que a batalha ja foi vencida antes de eu acordar para lutar. O resultado foi decidido numa colina chamada Calvario, num tumulo que nao conseguiu guardar o que tentou conter. Que combato a partir da vitoria, nao para ela. O desfecho e conhecido. A vitoria e certa. E desta certeza, enfrento o dia."},
  {dia:29,titulo:"Legado de Fe",texto:"Que minha vida seja uma epistola legivel, Senhor. Um texto vivo que aqueles ao meu redor possam ler e encontrar pistas do Teu amor. Nao preciso de grandes feitos. Preciso de uma vida coerente, que diga com o cotidiano o que declaro com a boca. Que os que vierem depois encontrem no meu rastro evidencias inegaveis da Tua fidelidade."},
  {dia:30,titulo:"O Fim que e Inicio",texto:"Este e o ultimo dia deste ciclo, Senhor, mas descobri que nao e o fim da jornada. E apenas o fim do inicio. Algo foi plantado nestes dias que ainda nao posso ver completamente. Sementes de oracao que trabalham debaixo da terra da minha alma. Que tudo o que foi plantado germine em tempo proprio. Que a colheita exceda o que consegui imaginar quando comecei. A Ti seja a gloria."}
];

var TOTAL = DIAS.length;
var cur = 0;
var animating = false;
var audioOn = false;
var PLAY = "<path d='M8 5v14l11-7z'/>";
var PAUSE = "<path d='M6 19h4V5H6v14zm8-14v14h4V5h-4z'/>";

function isMob(){ return window.innerWidth < 769; }

function buildPageHTML(idx, side){
  if(idx < 0 || idx >= TOTAL) return "<div class='desk-page-inner'></div>";
  var d = DIAS[idx];
  return "<div class='desk-page-inner'>" +
    "<div class='corner tl'></div><div class='corner tr'></div><div class='corner bl'></div><div class='corner br'></div>" +
    "<div class='page-day-label'>Dia " + d.dia + " de " + TOTAL + "</div>" +
    "<div class='page-prayer-title'>" + d.titulo + "</div>" +
    "<div class='page-rule'></div>" +
    "<div class='page-img-wrap'><img src='"+ IMG_SRC +"' alt='oracao' style='width:100%;display:block;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.18));'></div>" +
    "<div class='page-prayer-text'>" + d.texto + "</div>" +
    "<div class='page-audio'><div class='play-btn' onclick='toggleAudioDesk("+ idx +")'><svg id='icon-desk-"+ idx +"' viewBox='0 0 24 24'><path d='M8 5v14l11-7z'/></svg></div><span class='audio-label'>Ouvir oracao</span></div>" +
    "<div class='page-num'>" + d.dia + "</div>" +
    "</div>";
}

/* MOBILE - atualiza card */
function updateMobile(){
  var d = DIAS[cur];
  var img = document.getElementById("mob-img");
  var lbl = document.getElementById("mob-label");
  var ttl = document.getElementById("mob-title");
  var txt = document.getElementById("mob-text");
  var num = document.getElementById("mob-num");
  if(img) img.src = IMG_SRC;
  if(lbl) lbl.textContent = "Dia "+d.dia+" de "+TOTAL;
  if(ttl) ttl.textContent = d.titulo;
  if(txt) txt.textContent = d.texto;
  if(num) num.textContent = d.dia;
  document.getElementById("mob-card").scrollTop = 0;
}

/* DESKTOP - Turn.js */
var deskReady = false;
function initDesk(){
  if(deskReady) return;
  deskReady = true;
  var book = document.getElementById("desk-book");
  // cria as paginas
  for(var i=0;i<TOTAL;i++){
    var pg = document.createElement("div");
    pg.innerHTML = buildPageHTML(i, i%2===0?"left":"right");
    book.appendChild(pg);
  }
  if(window.jQuery && jQuery.fn.turn){
    jQuery("#desk-book").turn({
      width: book.offsetWidth,
      height: book.offsetHeight,
      elevation: 50,
      gradients: true,
      autoCenter: true,
      display: "double",
      acceleration: true,
      when:{
        turned: function(e, page){
          cur = page - 1;
          if(cur < 0) cur = 0;
          updateHeader();
          updateArrows();
        }
      }
    });
  }
}

function updateHeader(){
  var d = DIAS[Math.min(cur,TOTAL-1)];
  document.getElementById("header-day").textContent = "Dia "+d.dia+" de "+TOTAL;
  document.getElementById("progress-fill").style.width = ((cur+1)/TOTAL*100)+"%";
}

function updateArrows(){
  var atStart = cur<=0;
  var atEndM  = cur>=TOTAL-1;
  var atEndD  = cur>=TOTAL-2;
  var mp = document.getElementById("mob-prev"); if(mp) mp.classList.toggle("hidden",atStart);
  var mn = document.getElementById("mob-next"); if(mn) mn.classList.toggle("hidden",atEndM);
  var dp = document.getElementById("desk-prev"); if(dp) dp.classList.toggle("hidden",atStart);
  var dn = document.getElementById("desk-next"); if(dn) dn.classList.toggle("hidden",atEndD);
}

/* NAVIGATE */
function navigate(dir){
  if(animating) return;

  if(!isMob()){
    // Turn.js desktop
    if(dir>0){ jQuery("#desk-book").turn("next"); }
    else      { jQuery("#desk-book").turn("previous"); }
    return;
  }

  // Mobile flip 3D
  var step = 1;
  var next = cur + (dir>0 ? step : -step);
  if(next<0||next>=TOTAL) return;
  animating = true;

  var card = document.getElementById("mob-card");
  var outC = dir>0 ? "anim-flip-out-left"  : "anim-flip-out-right";
  var inC  = dir>0 ? "anim-flip-in-right"  : "anim-flip-in-left";

  card.classList.add(outC);
  setTimeout(function(){
    card.classList.remove(outC);
    cur = next;
    updateMobile();
    updateHeader();
    updateArrows();
    card.classList.add(inC);
    setTimeout(function(){
      card.classList.remove(inC);
      animating = false;
    }, 430);
  }, 410);
}

/* AUDIO */
function toggleAudio(){
  audioOn = !audioOn;
  var ic = document.getElementById("icon-mob");
  if(ic) ic.innerHTML = audioOn ? PAUSE : PLAY;
}
function toggleAudioDesk(idx){
  var ic = document.getElementById("icon-desk-"+idx);
  if(!ic) return;
  var playing = ic.innerHTML.indexOf("M6")>-1;
  ic.innerHTML = playing ? PLAY : PAUSE;
}
function goBack(){ history.back(); }

/* SWIPE */
var tx=0,ty=0;
document.addEventListener("touchstart",function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener("touchend",function(e){
  var dx=e.changedTouches[0].clientX-tx;
  var dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>45) navigate(dx<0?1:-1);
},{passive:true});

/* DRAG */
var mx=0,mdown=false;
document.addEventListener("mousedown",function(e){if(e.button===0){mx=e.clientX;mdown=true;}});
document.addEventListener("mouseup",function(e){if(!mdown)return;mdown=false;var dx=e.clientX-mx;if(Math.abs(dx)>65)navigate(dx<0?1:-1);});

/* KEYBOARD */
document.addEventListener("keydown",function(e){if(e.key==="ArrowRight")navigate(1);if(e.key==="ArrowLeft")navigate(-1);});

/* INIT */
updateMobile();
updateHeader();
updateArrows();
window.addEventListener("load", function(){
  if(!isMob()) initDesk();
});
window.addEventListener("resize", function(){
  if(!isMob() && !deskReady) initDesk();
});
</script>
</body>
</html>
